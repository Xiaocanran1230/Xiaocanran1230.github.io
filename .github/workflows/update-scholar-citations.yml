name: Update Scholar citations

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: scholar-citation-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out the site
        uses: actions/checkout@v6

      - name: Refresh Google Scholar citations
        run: python3 scripts/update_scholar_citations.py

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit the updated count
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/scholar-citations.json index.html
          git commit -m "chore: update Scholar citations"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Rebuild GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"
